name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_PACKAGE: sandra_sentinel
  BINARY_NAME: sandra-sentinel
  HOMEBREW_TAP_REPO: code-epic/homebrew-sandra
  HOMEBREW_FORMULA: sandra-sentinel.rb

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sandra-sentinel-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: sandra-sentinel-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sandra-sentinel-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} --package ${{ env.RUST_PACKAGE }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} release/${{ matrix.artifact_name }}
          chmod +x release/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            for binary in "$dir"/*; do
              cp "$binary" ../release/
            done
          done
          cd ../release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: create-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          VERSION_TRIMMED: ${{ github.ref_name }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          
          cd homebrew-tap
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          sed -i "s/version \"[^\"]*\"/version \"$VERSION\"/" Formula/${{ env.HOMEBREW_FORMULA }}
          
          sed -i "s/vVERSION_PLACEHOLDER/v$VERSION/g" Formula/${{ env.HOMEBREW_FORMULA }}
          
          ASSETS_URL="https://github.com/code-epic/sandra.sentinel/releases/download/v$VERSION"
          
          for binary in sandra-sentinel-aarch64-apple-darwin sandra-sentinel-x86_64-apple-darwin sandra-sentinel-x86_64-unknown-linux-gnu; do
            curl -sL "$ASSETS_URL/$binary" -o "/tmp/$binary"
            sha=$(sha256sum "/tmp/$binary" | awk '{print $1}')
            sed -i "s|sha256 \".*\" # $binary|sha256 \"$sha\" # $binary|" Formula/${{ env.HOMEBREW_FORMULA }}
          done
          
          cat Formula/${{ env.HOMEBREW_FORMULA }} | grep -E "(url|version|sha256)"
          
          git add Formula/${{ env.HOMEBREW_FORMULA }}
          git diff --staged --stat
          git commit -m "Release v$VERSION"
          git push
