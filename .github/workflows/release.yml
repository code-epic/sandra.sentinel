name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_PACKAGE: sandra_sentinel
  BINARY_NAME: sandra-sentinel
  HOMEBREW_TAP_REPO: code-epic/homebrew-sandra
  HOMEBREW_FORMULA: sandra-sentinel.rb

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14  # Apple Silicon runners
            target: aarch64-apple-darwin
            artifact_name: sandra-sentinel-aarch64-apple-darwin
            cross: false
          - os: macos-14
            target: x86_64-apple-darwin
            artifact_name: sandra-sentinel-x86_64-apple-darwin
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sandra-sentinel-centos8-x86_64
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install protobuf
          else
            PROTOC_VERSION="25.1"
            curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
            unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d $HOME/.local
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi

      - name: Install cross toolchain (macOS cross-compile)
        if: matrix.cross == true
        run: |
          rustup target add ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} --package ${{ env.RUST_PACKAGE }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} release/${{ matrix.artifact_name }}
          chmod +x release/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            for binary in "$dir"/*; do
              cp "$binary" ../release/
            done
          done
          cd ../release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: create-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Update formula via GitHub API
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ASSETS_URL="https://github.com/code-epic/sandra.sentinel/releases/download/v$VERSION"
          FORMULA_PATH="Formula/sandra-sentinel.rb"
          REPO="${{ env.HOMEBREW_TAP_REPO }}"

          # Descargar binarios y calcular sha256
          declare -A SHASUMS
          for binary in sandra-sentinel-aarch64-apple-darwin sandra-sentinel-x86_64-apple-darwin sandra-sentinel-centos8-x86_64; do
            echo "Downloading $binary..."
            curl -sL "$ASSETS_URL/$binary" -o "/tmp/$binary"
            SHASUMS[$binary]=$(sha256sum "/tmp/$binary" | awk '{print $1}')
            echo "$binary sha256: ${SHASUMS[$binary]}"
          done

          # Obtener el contenido actual de la fórmula via API
          FILE_INFO=$(gh api "repos/$REPO/contents/$FORMULA_PATH")
          FILE_SHA=$(echo "$FILE_INFO" | jq -r '.sha')
          CONTENT=$(echo "$FILE_INFO" | jq -r '.content' | base64 -d)

          # Aplicar sustituciones
          # Nota: los patrones cubren ambos formatos:
          #   sha256 "HASH # binary"   (comentario dentro de comillas)
          #   sha256 "HASH" # binary   (comentario fuera de comillas)
          UPDATED=$(echo "$CONTENT" \
            | sed "s/version \"[^\"]*\"/version \"$VERSION\"/" \
            | sed "s|v[0-9]*\.[0-9]*\.[0-9]*\|vVERSION_PLACEHOLDER|v$VERSION|g" \
            | sed "s|sha256 \"[^\"]*# sandra-sentinel-aarch64-apple-darwin\"|sha256 \"${SHASUMS[sandra-sentinel-aarch64-apple-darwin]} # sandra-sentinel-aarch64-apple-darwin\"|" \
            | sed "s|sha256 \"[^\"]*# sandra-sentinel-x86_64-apple-darwin\"|sha256 \"${SHASUMS[sandra-sentinel-x86_64-apple-darwin]} # sandra-sentinel-x86_64-apple-darwin\"|" \
            | sed "s|sha256 \"[^\"]*# sandra-sentinel-centos8-x86_64\"|sha256 \"${SHASUMS[sandra-sentinel-centos8-x86_64]} # sandra-sentinel-centos8-x86_64\"|")

          echo "--- Formula actualizada ---"
          echo "$UPDATED" | grep -E "(url|version|sha256)"

          # Subir via API (sin git push)
          ENCODED=$(echo "$UPDATED" | base64 -w 0)
          gh api "repos/$REPO/contents/$FORMULA_PATH" \
            --method PUT \
            --field message="Release v$VERSION" \
            --field content="$ENCODED" \
            --field sha="$FILE_SHA"

          echo "✅ Fórmula actualizada exitosamente"
