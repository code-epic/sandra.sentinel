name: Release — Sandra Sentinel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

  build:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          # sandra-sentinel (CLI principal — core + conciliate + patria)
          - product: sandra-sentinel
            package: sandra_sentinel
            bin: sandra-sentinel
            os: macos-14
            target: aarch64-apple-darwin
            artifact: sandra-sentinel-aarch64-apple-darwin
            cross: false
          - product: sandra-sentinel
            package: sandra_sentinel
            bin: sandra-sentinel
            os: macos-14
            target: x86_64-apple-darwin
            artifact: sandra-sentinel-x86_64-apple-darwin
            cross: true
          - product: sandra-sentinel
            package: sandra_sentinel
            bin: sandra-sentinel
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sandra-sentinel-x86_64-linux-gnu
            cross: false

          # sandra-reconciliate (Streaming Engine)
          - product: sandra-reconciliate
            package: reconciler
            bin: sandra-reconciler
            os: macos-14
            target: aarch64-apple-darwin
            artifact: sandra-reconciliate-aarch64-apple-darwin
            cross: false
          - product: sandra-reconciliate
            package: reconciler
            bin: sandra-reconciler
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sandra-reconciliate-x86_64-linux-gnu
            cross: false

          # sandra-conciliate (Batch Diff Engine — ex scf)
          - product: sandra-conciliate
            package: sandra-conciliate
            bin: sandra-conciliate
            os: macos-14
            target: aarch64-apple-darwin
            artifact: sandra-conciliate-aarch64-apple-darwin
            cross: false
          - product: sandra-conciliate
            package: sandra-conciliate
            bin: sandra-conciliate
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sandra-conciliate-x86_64-linux-gnu
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install protobuf
          else
            PROTOC_VERSION="25.1"
            curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
            unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d $HOME/.local
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi

      - name: Install cross toolchain (macOS cross-compile)
        if: matrix.cross == true
        run: rustup target add ${{ matrix.target }}

      - name: Inject version into build
        run: |
          echo "SENTINEL_VERSION=${{ needs.extract-version.outputs.version }}" >> $GITHUB_ENV
          echo "SENTINEL_COMMIT=${{ github.sha }}" >> $GITHUB_ENV
          echo "SENTINEL_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build release binary
        run: |
          SENTINEL_VERSION=${{ needs.extract-version.outputs.version }} \
          SENTINEL_COMMIT=${{ github.sha }} \
          SENTINEL_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
          cargo build --release --target ${{ matrix.target }} --package ${{ matrix.package }}

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.bin }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} release/${{ matrix.artifact }}
          chmod +x release/${{ matrix.artifact }}
          # Copiar man pages comunes a todos los productos
          cp man/sandra-sentinel.1 man/sandra-reconciler.1 man/sandra-conciliate.1 man/sandra.7 release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*

  create-release:
    needs: [extract-version, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release directory & checksums
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            for file in "$dir"/*; do
              cp "$file" ../release/
            done
          done
          cd ../release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sandra Sentinel v${{ needs.extract-version.outputs.version }}"
          body: |
            ## Sandra Sentinel Ecosystem v${{ needs.extract-version.outputs.version }}

            ### Binarios incluidos
            - `sandra-sentinel` — Core de nómina, conciliación bancaria y patria (LOFANB)
            - `sandra-reconciler` — Motor de conciliación streaming CSV vs gRPC
            - `sandra-conciliate` — Comparador batch de archivos CSV (ex scf)

            ### Man pages incluidas (instalar con `./install-man.sh`)
            - `sandra-sentinel(1)` — CLI principal y subcomandos
            - `sandra-reconciler(1)` — Motor de conciliación streaming
            - `sandra-conciliate(1)` — Comparador batch CSV
            - `sandra(7)` — Overview del ecosistema Sandra Sentinel

            ### Subcomandos de sandra-sentinel
            - `sandra start` — Ciclo de carga y cálculo de nómina
            - `sandra conciliate` — Diferencias batch entre archivos CSV
            - `sandra reconcile-stream` — Conciliación streaming CSV vs gRPC
            - `sandra patria` — Generación de nómina para Sistema Patria
            - `sandra validar` — Validación de claves de acceso

            ### Verificación de integridad
            ```
            sha256sum -c checksums.txt
            ```

            ### Compatibilidad
            | Plataforma | Arquitectura |
            |------------|--------------|
            | macOS      | aarch64, x86_64 |
            | Linux      | x86_64 (glibc) |
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: create-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
          VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ASSETS_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION"
          FORMULA_PATH="Formula/sandra-sentinel.rb"
          REPO="code-epic/homebrew-sandra"

          declare -A SHASUMS
          for binary in sandra-sentinel-aarch64-apple-darwin sandra-sentinel-x86_64-apple-darwin sandra-sentinel-x86_64-linux-gnu; do
            curl -sL "$ASSETS_URL/$binary" -o "/tmp/$binary"
            SHASUMS[$binary]=$(sha256sum "/tmp/$binary" | awk '{print $1}')
          done

          FILE_INFO=$(gh api "repos/$REPO/contents/$FORMULA_PATH")
          FILE_SHA=$(echo "$FILE_INFO" | jq -r '.sha')
          CONTENT=$(echo "$FILE_INFO" | jq -r '.content' | base64 -d)

          UPDATED=$(echo "$CONTENT" \
            | sed "s/version \"[^\"]*\"/version \"$VERSION\"/" \
            | sed "s|/download/v[0-9][^/]*/|/download/v$VERSION/|g" \
            | sed "s|sha256 \"[^\"]*# sandra-sentinel-aarch64-apple-darwin\"|sha256 \"${SHASUMS[sandra-sentinel-aarch64-apple-darwin]}\"|" \
            | sed "s|sha256 \"[^\"]*# sandra-sentinel-x86_64-apple-darwin\"|sha256 \"${SHASUMS[sandra-sentinel-x86_64-apple-darwin]}\"|" \
            | sed "s|sha256 \"[^\"]*# sandra-sentinel-x86_64-linux-gnu\"|sha256 \"${SHASUMS[sandra-sentinel-x86_64-linux-gnu]}\"|")

          ENCODED=$(echo "$UPDATED" | base64 -w 0)
          gh api "repos/$REPO/contents/$FORMULA_PATH" \
            --method PUT \
            --field message="Release v$VERSION" \
            --field content="$ENCODED" \
            --field sha="$FILE_SHA"
